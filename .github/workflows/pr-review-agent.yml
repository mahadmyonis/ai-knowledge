# Automatically review PRs assigned to you (or where you're a requested reviewer).
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   Secret:  CURSOR_API_KEY  — from cursor.com/dashboard → API Keys
#   Variable: PR_REVIEW_USER — your GitHub username (e.g. mahadmyonis)
#
# See docs/PR_REVIEW_AGENT.md for full setup.

name: PR Review Agent

on:
  pull_request:
    types: [opened, synchronize, assigned, review_requested, ready_for_review]
  schedule:
    # Catch anything missed by webhooks (every 30 minutes)
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Optional PR number to review (blank = scan all assigned)"
        required: false
        type: string

concurrency:
  group: pr-review-${{ github.event.pull_request.number || 'scan' }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.repository == 'Retriive/campusQ' || github.repository == 'retriive/campusq'
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Determine PRs to review
        id: prs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_REVIEW_USER: ${{ vars.PR_REVIEW_USER }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          ASSIGNEE_LOGIN: ${{ github.event.assignee.login }}
          REQUESTED_REVIEWER: ${{ github.event.requested_reviewer.login }}
          PR_ASSIGNEES: ${{ toJson(github.event.pull_request.assignees) }}
          PR_REQUESTED_REVIEWERS: ${{ toJson(github.event.pull_request.requested_reviewers) }}
        run: |
          python3 scripts/pr_review/select_prs.py --json > prs.json
          echo "count=$(python3 -c 'import json; print(len(json.load(open("prs.json"))))')" >> "$GITHUB_OUTPUT"
          cat prs.json

      - name: Trigger Cursor review agent
        if: steps.prs.outputs.count != '0'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/pr_review/trigger_cursor_review.py --from-file prs.json
