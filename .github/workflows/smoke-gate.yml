name: Smoke quality gate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run smoke quality gate against production
        env:
          CAMPUSQ_API_URL: ${{ secrets.CAMPUSQ_API_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python evals/quality_gate.py --tier smoke

      - name: Upload experiment results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-gate-results
          path: backend/evals/experiments/
          if-no-files-found: ignore
